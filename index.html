<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body>
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="todo-container position-relative p-4 rounded shadow bg-white">
            <div class="pin-emoji position-absolute top-0 start-0 m-3 fs-2">📌</div>
            <h1 class="animated-heading mb-4">
                <span class="letter">Just</span>
                <span class="letter"> do it.</span>
            </h1>
            <section class="input-group mb-3">
                <input type="text" id="taskInput" class="form-control" placeholder="Add a task." aria-label="New task" />
                <button id="addTaskBtn" class="btn btn-primary">I Got This!</button>
            </section>
            <ul id="taskList" aria-live="polite" aria-label="To-Do List" class="list-unstyled"></ul>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
